<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Job Alert{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<header class="app-header">
    <div class="header-inner">
        <span class="app-logo">Job Alert</span>
        <nav class="header-nav">
            <a href="/" class="nav-link {% if request.path == '/' %}nav-link--active{% endif %}">Dashboard</a>
            <a href="/configure" class="nav-link {% if request.path == '/configure' %}nav-link--active{% endif %}">Configure</a>
        </nav>
        <span class="header-meta" id="header-meta"></span>
    </div>
</header>

<main class="main-content">
    {% block content %}{% endblock %}
</main>

<footer class="app-footer">
    <span>Running locally · port 5001</span>
</footer>

{% block scripts %}{% endblock %}

</body>
</html>
